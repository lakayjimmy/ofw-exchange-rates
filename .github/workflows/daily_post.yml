name: Daily PHP Exchange Rate

on:
  schedule:
    - cron: '0 4 * * *'  # 4AM UTC = 8AM Dubai time
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pillow pytz

      - name: Run image generator
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
        run: python generate_image.py

      - name: Commit and push image
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest_rates.png
          git commit -m "Update exchange rate image - $(date +'%Y-%m-%d')"
          git push
